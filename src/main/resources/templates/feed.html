<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <div class="shell-frame">
        <header class="topbar">
            <div class="brand-mark"><div class="pulse"></div><span>StartupHub</span></div>
            <nav class="nav-links">
                <a class="active" href="/app/feed">Feed</a>
                <a href="/app/discovery">Discovery</a>
                <a href="/app/profile">Profile</a>
                <a href="/app/startups">Startups</a>
                <a href="/app/notifications">Notifications</a>
                <a href="/app/messages">Messages</a>
            </nav>
            <button id="logout-btn" class="ghost-btn">Logout</button>
        </header>

        <section class="page-grid">
            <aside class="sidebar-card">
                <div class="eyebrow">Welcome back</div>
                <h2 class="page-title" id="welcome-name">Founder</h2>
                <p class="page-subtitle">Share momentum, follow progress, and keep your circle warm.</p>
                <div class="metric-grid">
                    <div class="metric">
                        <span class="muted">Feed posts</span>
                        <strong id="metric-posts">0</strong>
                    </div>
                    <div class="metric">
                        <span class="muted">Notifications</span>
                        <strong id="metric-notifications">0</strong>
                    </div>
                </div>
            </aside>

            <main class="content-stack">
                <section class="surface-card composer">
                    <div class="list-head">
                        <div>
                            <div class="eyebrow">New update</div>
                            <h3>Post to your network</h3>
                        </div>
                    </div>
                    <form id="composer-form" class="stack">
                        <div class="field">
                            <label for="post-content">What are you building?</label>
                            <textarea id="post-content" placeholder="Shipping milestones, founder notes, launch updates..." required></textarea>
                        </div>
                        <div class="field">
                            <label for="post-image">Attach image</label>
                            <input id="post-image" type="file" accept="image/*">
                        </div>
                        <div class="media-preview"><img id="post-image-preview" alt="Selected post image preview"></div>
                        <button type="submit" class="primary-btn">Publish update</button>
                    </form>
                    <div id="composer-status" class="status"></div>
                </section>

                <section class="surface-card">
                    <div class="list-head">
                        <div>
                            <div class="eyebrow">Live feed</div>
                            <h3>Founder momentum</h3>
                        </div>
                    </div>
                    <div id="feed-list" class="content-stack"></div>
                </section>
            </main>
        </section>
    </div>
</div>
<script src="/js/feed.js"></script>
</body>
</html>
