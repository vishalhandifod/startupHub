<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <div class="shell-frame">
        <header class="topbar">
            <div class="brand-mark"><div class="pulse"></div><span>StartupHub</span></div>
            <nav class="nav-links">
                <a href="/app/feed">Feed</a>
                <a class="active" href="/app/discovery">Discovery</a>
                <a href="/app/profile">Profile</a>
                <a href="/app/startups">Startups</a>
                <a href="/app/notifications">Notifications</a>
                <a href="/app/messages">Messages</a>
            </nav>
        </header>
        <section class="page-grid">
            <aside class="sidebar-card">
                <div class="eyebrow">Search people</div>
                <h2 class="page-title">Discovery</h2>
                <p class="page-subtitle">Find operators, founders, and future collaborators.</p>
                <form id="search-form" class="stack">
                    <div class="field">
                        <label for="search-query">Name or email</label>
                        <input id="search-query" type="text" placeholder="Search founders">
                    </div>
                    <button type="submit" class="primary-btn">Search</button>
                </form>
            </aside>
            <main class="content-stack">
                <section class="surface-card">
                    <div class="eyebrow">Suggested connections</div>
                    <h3>People worth meeting</h3>
                    <div id="suggestions-list" class="people-grid"></div>
                </section>
                <section class="surface-card">
                    <div class="eyebrow">Search results</div>
                    <h3>Matches</h3>
                    <div id="search-results" class="people-grid"></div>
                </section>
            </main>
        </section>
    </div>
</div>
<script src="/js/discovery.js"></script>
</body>
</html>
