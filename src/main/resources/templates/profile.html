<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <div class="shell-frame">
        <header class="topbar">
            <div class="brand-mark"><div class="pulse"></div><span>StartupHub</span></div>
            <nav class="nav-links">
                <a href="/app/feed">Feed</a>
                <a href="/app/discovery">Discovery</a>
                <a class="active" href="/app/profile">Profile</a>
                <a href="/app/startups">Startups</a>
                <a href="/app/notifications">Notifications</a>
                <a href="/app/messages">Messages</a>
            </nav>
        </header>
        <section class="page-grid">
            <aside class="sidebar-card">
                <div class="profile-avatar">
                    <img id="profile-avatar-image" src="https://images.unsplash.com/photo-1522556189639-b150c1ea6b1f?auto=format&fit=crop&w=900&q=80" alt="Profile photo">
                </div>
                <h2 class="page-title" id="profile-name">Founder</h2>
                <p class="muted" id="profile-email"></p>
                <p id="profile-bio-display" class="page-subtitle"></p>
            </aside>
            <main class="content-stack">
                <section class="surface-card">
                    <div class="eyebrow">Edit profile</div>
                    <h3>Keep your story current</h3>
                    <form id="profile-form" class="stack">
                        <div class="field">
                            <label for="profile-name-input">Name</label>
                            <input id="profile-name-input" type="text">
                        </div>
                        <div class="field">
                            <label for="profile-bio-input">Bio</label>
                            <textarea id="profile-bio-input"></textarea>
                        </div>
                        <div class="field">
                            <label for="profile-photo-input">Profile photo</label>
                            <input id="profile-photo-input" type="file" accept="image/*">
                        </div>
                        <button type="submit" class="primary-btn">Save profile</button>
                    </form>
                    <div id="profile-status" class="status"></div>
                </section>
                <section class="surface-card">
                    <div class="eyebrow">Followers</div>
                    <div id="followers-list" class="people-grid"></div>
                </section>
                <section class="surface-card">
                    <div class="eyebrow">Following</div>
                    <div id="following-list" class="people-grid"></div>
                </section>
            </main>
        </section>
    </div>
</div>
<script src="/js/profile.js"></script>
</body>
</html>
