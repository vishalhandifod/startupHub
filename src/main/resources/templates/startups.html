<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <div class="shell-frame">
        <header class="topbar">
            <div class="brand-mark"><div class="pulse"></div><span>StartupHub</span></div>
            <nav class="nav-links">
                <a href="/app/feed">Feed</a>
                <a href="/app/discovery">Discovery</a>
                <a href="/app/profile">Profile</a>
                <a class="active" href="/app/startups">Startups</a>
                <a href="/app/notifications">Notifications</a>
                <a href="/app/messages">Messages</a>
            </nav>
        </header>
        <section class="page-grid">
            <aside class="sidebar-card">
                <div class="eyebrow">Launch a page</div>
                <h2 class="page-title">Startup pages</h2>
                <p class="page-subtitle">Give each venture a home with followers, branding, and a public identity.</p>
                <form id="startup-form" class="stack">
                    <div class="field"><label for="startup-name-input">Name</label><input id="startup-name-input" type="text" required></div>
                    <div class="field"><label for="startup-slug-input">Slug</label><input id="startup-slug-input" type="text" required></div>
                    <div class="field"><label for="startup-description-input">Description</label><textarea id="startup-description-input"></textarea></div>
                    <div class="field"><label for="startup-website-input">Website</label><input id="startup-website-input" type="url"></div>
                    <div class="field"><label for="startup-industry-input">Industry</label><input id="startup-industry-input" type="text"></div>
                    <div class="field"><label for="startup-location-input">Location</label><input id="startup-location-input" type="text"></div>
                    <div class="field"><label for="startup-logo-input">Logo</label><input id="startup-logo-input" type="file" accept="image/*"></div>
                    <button type="submit" class="primary-btn">Create startup</button>
                </form>
                <div id="startup-status" class="status"></div>
            </aside>
            <main class="surface-card">
                <div class="eyebrow">Browse</div>
                <h3>Active startup pages</h3>
                <div id="startup-list" class="startup-grid"></div>
            </main>
        </section>
    </div>
</div>
<script src="/js/startups.js"></script>
</body>
</html>
