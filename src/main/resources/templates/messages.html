<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <div class="shell-frame">
        <header class="topbar">
            <div class="brand-mark"><div class="pulse"></div><span>StartupHub</span></div>
            <nav class="nav-links">
                <a href="/app/feed">Feed</a>
                <a href="/app/discovery">Discovery</a>
                <a href="/app/profile">Profile</a>
                <a href="/app/startups">Startups</a>
                <a href="/app/notifications">Notifications</a>
                <a class="active" href="/app/messages">Messages</a>
            </nav>
        </header>

        <main class="surface-card">
            <div class="eyebrow">Inbox</div>
            <h2 class="page-title">Founder messages</h2>
            <p class="page-subtitle">Stay close to collaborators, investors, and operators in a private thread.</p>

            <section class="messages-layout">
                <aside class="messages-sidebar">
                    <div class="field">
                        <label for="message-user-id">Open conversation with user id</label>
                        <input id="message-user-id" type="number" min="1" placeholder="2">
                    </div>
                    <button id="open-conversation-btn" class="primary-btn">Open conversation</button>
                    <div id="messages-status" class="status"></div>
                    <div id="conversation-list" class="content-stack"></div>
                </aside>

                <section class="messages-thread">
                    <div class="messages-thread-header">
                        <div>
                            <div class="eyebrow">Active thread</div>
                            <h3 id="active-conversation-name">Choose a conversation</h3>
                        </div>
                    </div>
                    <div id="message-thread" class="message-thread-list">
                        <div class="empty-state">Open a conversation to start chatting.</div>
                    </div>
                    <form id="message-form" class="stack">
                        <div class="field">
                            <label for="message-content">Message</label>
                            <textarea id="message-content" placeholder="Send a founder update, ask for context, or keep momentum going."></textarea>
                        </div>
                        <button type="submit" class="primary-btn">Send message</button>
                    </form>
                </section>
            </section>
        </main>
    </div>
</div>
<script src="/js/messages.js"></script>
</body>
</html>
